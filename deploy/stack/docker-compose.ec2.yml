services:
  app:
    image: ${APP_IMAGE}
    container_name: family-tree-app
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: pro
      DB_URL: ${DB_URL}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      LIVESTREAM_ICE_SERVERS_JSON: ${LIVESTREAM_ICE_SERVERS_JSON}
      JAVA_TOOL_OPTIONS: -Xms256m -Xmx512m -XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0
      TZ: Asia/Ho_Chi_Minh
    ports:
      - "127.0.0.1:8080:8080"
    mem_limit: 900m
    cpus: "1.00"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
