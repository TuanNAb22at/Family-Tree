name: Build & Deploy Spring Boot App to AWS EC2

on:
  push:
    branches: [main]

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest
    env:
      APP_NAME: family-tree-app
      IMAGE_NAME: ${{ secrets.DOCKER_USER }}/family-tree-app:latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and push Docker image to Docker Hub
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE_NAME }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: SSH into EC2 and deploy container
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            APP_NAME="${{ env.APP_NAME }}"
            IMAGE_NAME="${{ env.IMAGE_NAME }}"

            echo ">>> Pulling latest image from Docker Hub"
            docker pull "$IMAGE_NAME"

            echo ">>> Stopping and removing old container if exists"
            docker rm -f "$APP_NAME" || true

            echo ">>> Running container"
            docker run -d \
              --name "$APP_NAME" \
              --restart unless-stopped \
              -p 8080:8080 \
              -e SPRING_PROFILES_ACTIVE=pro \
              -e DB_URL='${{ secrets.DB_URL }}' \
              -e DB_USERNAME='${{ secrets.DB_USERNAME }}' \
              -e DB_PASSWORD='${{ secrets.DB_PASSWORD }}' \
              -e LIVESTREAM_ICE_SERVERS_JSON='${{ secrets.LIVESTREAM_ICE_SERVERS_JSON }}' \
              -e JAVA_OPTS="-Xms512m -Xmx512m -XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0" \
              -e TZ=Asia/Ho_Chi_Minh \
              "$IMAGE_NAME"

            echo ">>> Status & logs"
            docker ps -a --filter "name=$APP_NAME"
